name: Run comparator

on:
  pull_request:
  workflow_dispatch:

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install elan
        run: |
          set -o pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache lake build
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Get mathlib cache
        run: lake exe cache get || true

      - name: Build Challenge and Solution
        run: |
          lake build Challenge
          lake build Solution

      # The comparator binary is supplied externally (e.g. from leanprover/comparator
      # releases). This step is a no-op stub: replace with the appropriate
      # download / install once available in CI.
      - name: Run comparator
        run: |
          if command -v comparator >/dev/null 2>&1; then
            comparator config.json
          else
            echo "comparator binary not installed; skipping. See config.json for setup."
          fi
